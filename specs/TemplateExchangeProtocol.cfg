\* TLC model configuration for TemplateExchangeProtocol.tla
\* Small-model parameters for tractable model checking.

SPECIFICATION FairSpec

\* --- Constants ---

CONSTANT Orgs = {o1, o2}
CONSTANT Templates = {t1, t2}
CONSTANT MinStage = [t1 |-> "EMBRYONIC", t2 |-> "EMBRYONIC"]
CONSTANT MIN_TRUST = 0.2
CONSTANT ADOPTION_THRESHOLD = 0.3
CONSTANT DECAY_ALPHA = 0.3
CONSTANT DEFAULT_TRUST = 0.5
CONSTANT MAX_OUTCOMES = 3
\* Each org starts with one DISTINCT template so Import is reachable.
\* Both templates have MinStage EMBRYONIC so Init doesn't violate safety.
CONSTANT InitLibrary = [o1 |-> {t1}, o2 |-> {t2}]

\* --- State invariants (checked at every reachable state) ---

INVARIANT TypeOK
INVARIANT TemplateAdoptionSafety
INVARIANT TrustMonotonicity

\* --- Liveness properties (NOT checked with default parameters) ---
\* With DEFAULT_TRUST=0.5 and ADOPTION_THRESHOLD=0.3, the default
\* success rate of 0.5 gives 0.5*0.5=0.25 < 0.3, so Import is
\* unreachable from Init. This matches the runtime: a fresh peer
\* with no history cannot be imported from without prior trust.
\* To check liveness, raise DEFAULT_TRUST to 0.8 or lower
\* ADOPTION_THRESHOLD to 0.2.
\*
\* PROPERTY QualifyingTemplateEventuallyAdopted
\* PROPERTY TrustConverges
