\* TLC model configuration for EvolutionGating.tla
\* Small-model parameters for tractable model checking.
\*
\* NOTE: The Evolve action contains \E s \in Real which TLC cannot enumerate
\* directly. To model-check this spec, override the Evolve action in TLC to
\* draw from a finite set of scores (e.g., {0.0, 0.5, 1.0}), or replace
\* the existential quantifier in Evolve with a finite domain. See the README
\* for details.

SPECIFICATION FairSpec

\* --- Constants ---

CONSTANT Orgs = {o1, o2}
CONSTANT MAX_VERSIONS = 5
CONSTANT MIN_IMPROVEMENT = 0.01

\* --- State invariants (checked at every reachable state) ---

INVARIANT TypeOK
INVARIANT VersionBound

\* --- Temporal safety properties (checked over behaviors) ---
\* MonotonicScore and GateBeforeDeploy use [][...]_vars so they are
\* temporal formulas, not state predicates.
\* No liveness property is provided — see the spec for rationale.

PROPERTY MonotonicScore
PROPERTY GateBeforeDeploy
