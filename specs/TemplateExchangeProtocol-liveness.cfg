\* TLC liveness config for TemplateExchangeProtocol.tla
\* Uses elevated DEFAULT_TRUST so Import is reachable and liveness
\* properties are satisfiable. This does NOT match the runtime default
\* (0.5); it tests the protocol under conditions where peers are
\* initially trusted enough to trigger adoption.

SPECIFICATION FairSpec

\* --- Constants (elevated trust for liveness reachability) ---

CONSTANT Orgs = {o1, o2}
CONSTANT Templates = {t1, t2}
CONSTANT MinStage = [t1 |-> "EMBRYONIC", t2 |-> "EMBRYONIC"]
CONSTANT MIN_TRUST = 0.2
CONSTANT ADOPTION_THRESHOLD = 0.3
CONSTANT DECAY_ALPHA = 0.3
CONSTANT DEFAULT_TRUST = 0.8
CONSTANT MAX_OUTCOMES = 3
CONSTANT InitLibrary = [o1 |-> {t1}, o2 |-> {t2}]

\* --- State invariants ---

INVARIANT TypeOK
INVARIANT TemplateAdoptionSafety
INVARIANT TrustMonotonicity

\* --- Liveness properties (satisfiable with DEFAULT_TRUST=0.8) ---

PROPERTY QualifyingTemplateEventuallyAdopted
PROPERTY TrustConverges
