\* TLC model configuration for DevelopmentalGating.tla
\* Small-model parameters for tractable model checking.

SPECIFICATION FairSpec

\* --- Constants ---

CONSTANT Orgs = {o1, o2}
CONSTANT Tools = {tool1, tool2}
CONSTANT Periods = {lang_acq, imprinting}
CONSTANT ToolMinStage = [tool1 |-> "EMBRYONIC", tool2 |-> "JUVENILE"]
CONSTANT PeriodOpensAt = [lang_acq |-> "EMBRYONIC", imprinting |-> "EMBRYONIC"]
CONSTANT PeriodClosesAt = [lang_acq |-> "ADOLESCENT", imprinting |-> "JUVENILE"]
CONSTANT MAX_TELOMERE = 10
CONSTANT JUVENILE_THRESH = 2
CONSTANT ADOLESCENT_THRESH = 5
CONSTANT MATURE_THRESH = 8

\* --- State invariants (checked at every reachable state) ---

INVARIANT TypeOK
INVARIANT CapabilityGating

\* --- Temporal / liveness properties (checked over behaviors) ---
\* CriticalPeriodIrreversibility, StageMonotonicity, and DevelopmentalProgress
\* use [][...]_vars so they are temporal formulas, not state predicates.

PROPERTY CriticalPeriodIrreversibility
PROPERTY StageMonotonicity
PROPERTY DevelopmentalProgress
PROPERTY EventualMaturity
